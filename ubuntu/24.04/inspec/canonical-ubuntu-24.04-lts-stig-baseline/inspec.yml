name: canonical-ubuntu-24.04-lts-stig-baseline
title: Canonical Ubuntu 24.04 LTS Security Technical Implementation Guide
maintainer: Broadcom
copyright: Broadcom
copyright_email: stigs@broadcom.com
license: Apache-2.0
summary: "This Security Technical Implementation Guide is published as a tool to improve the security of Department of Defense (DoD) information systems. The requirements are derived from the National Institute of Standards and Technology (NIST) 800-53 and related documents. Comments or proposed revisions to this document should be sent via email to the following address: disa.stig_spt@mail.mil."
version: 1.0.5
supports:
  - platform-name: ubuntu
    release: 24.04
inputs:
  - name: aide_conf_path
    description: Path to aide.conf
    type: String
    value: '/etc/aide/aide.conf'
  - name: audisp_remote_config_file
    description: Audisp remote Configuration file
    type: String
    value: '/etc/audit/plugins.d/au-remote.conf'
  - name: audit_sp_remote_server
    description: Address of the remote server receiving the audit log
    type: String
    value: ''
  - name: sshdcommand
    description: If a different sshd command is needed then supply a different input value such as if there are user matching rules.
    type: String
    value: 'sshd -T'
  - name: maxlogins
    description: Maximum number of concurrent sessions
    type: Numeric
    value: 10
  - name: tmout
    description: Inactivity timeouts, in seconds, after which operating system automatically terminates a user session.
    type: numeric
    value: 600
  - name: temporary_accounts
    description: Temporary user accounts
    type: Array
    value: []
  - name: useradd_configuration
    description: Specifies default settings applied when creating new user accounts using the `useradd` command on Linux systems.
    type: String
    value: '/etc/default/useradd'
  - name: approved_system_groups
    description: 'List of approved group owners for system command files'
    type: Array
    value:
      - root
      - daemon
      - adm
      - shadow
      - mail
      - crontab
      - _ssh
  - name: password_quality_file
    description: 'File to configure password quality policies'
    type: String
    value: '/etc/security/pwquality.conf'
  - name: common_password_file
    description: 'File to configure password-related policies'
    type: String
    value: '/etc/pam.d/common-password'
  - name: common_auth_file
    description: 'File to configure authentication rules'
    type: String
    value: '/etc/pam.d/common-auth'
  - name: faillock_file
    description: 'File to define how the system responds to failed authentication attempts'
    type: String
    value: '/etc/security/faillock.conf'
  - name: pam_pkcs11_config_file
    description: 'Configuration file for the pam_pkcs11.so PAM module'
    type: String
    value: '/etc/pam_pkcs11/pam_pkcs11.conf'
  - name: sssd_conf_path
    description: Path to sssd.conf
    type: String
    value: '/etc/sssd/sssd.conf'
  - name: sssd_conf_d_directory
    description: Path to sssd conf.d directory
    type: String
    value: '/etc/sssd/conf.d'
  - name: smartcards_used
    description: If smartcards are used for local logins. For VMware appliance this is false by default.
    type: boolean
    value: false
  - name: fips_config_file
    description: Path to enable FIPS
    type: String
    value: '/proc/sys/crypto/fips_enabled'
  - name: is_kdump_required
    description: Is kdump service required? (check with SA and documented with ISSO)
    type: Boolean
    value: false
  - name: sudo_accounts
    description: Array of users who need access to security functions are part of the sudo group.
    type: Array
    value: []
  - name: is_system_networked
    description: Set to true if the system is networked for NTP check
    type: Boolean
    value: true
  - name: chrony_conf_file_path
    description: Path to chrony conf file
    type: String
    value: '/etc/chrony/chrony.conf'
  - name: approved_wireless_network_interfaces
    description: Array of approved network interfaces (wired & wireless)
    type: Array
    value: []
  - name: minimum_accepted_partition_size
    description: Set audit log size in bytes (default:1073741824 per control specification)
    type: Numeric
    value: 8894028
  - name: audit_offload_script_name
    description: Script file name for audit offload in cron.weekly
    type: String
    value: ''
  - name: action_mail_acct
    description: Email to be notified when allocated audit record storage volume reaches capacity.
    type: string
    value: root
  - name: audit_tools
    description: Array of audit tools to check ownership and permissions.
    type: Array
    value: [
      '/sbin/auditctl',
      '/sbin/aureport',
      '/sbin/ausearch',
      '/sbin/autrace',
      '/sbin/auditd',
      '/sbin/augenrules'
    ]
  - name: audit_rules_file
    description: File to configure audit rules.
    type: string
    value: '/etc/audit/audit.rules'
