# Ubuntu Configurations
ubuntu_2404_defaults_unattended_upgrades_file_path: '/etc/apt/apt.conf.d/50unattended-upgrades'
ubuntu_2404_defaults_auditd_rule_template_file: 'audit.STIG.rules'
ubuntu_2404_defaults_sysctl_files:
  - /run/sysctl.d/*
  - /etc/sysctl.d/*
  - /usr/local/lib/sysctl.d/*
  - /usr/lib/sysctl.d/*
  - /lib/sysctl.d/*
ubuntu_2404_defaults_audit_tools:
  - /sbin/auditctl
  - /sbin/aureport
  - /sbin/ausearch
  - /sbin/autrace
  - /sbin/auditd
  - /sbin/augenrules
ubuntu_2404_defaults_journalctl_command_path: '/bin/journalctl'
ubuntu_2404_defaults_systemd_journal: '/usr/lib/tmpfiles.d/systemd.conf'
ubuntu_2404_defaults_sudoers_file: '/etc/sudoers'
ubuntu_2404_defaults_sudoers_d_folder: '/etc/sudoers.d'
ubuntu_2404_defaults_boot_grub_cfg_file: '/boot/grub/grub.cfg'
ubuntu_2404_defaults_limits_d_folder: '/etc/security/limits.d'
ubuntu_2404_defaults_sssd_conf_path: '/etc/sssd/sssd.conf'
ubuntu_2404_defaults_etc_issue_file: '/etc/issue.net'
ubuntu_2404_defaults_timeout_script_file: '99-terminal_tmout.sh'
ubuntu_2404_defaults_terminal_tmout_seconds: 900

# Handler "reboot system": seconds before reboot after playbook finishes (no wait for host to return).
ubuntu_2404_defaults_reboot_async_delay_seconds: 10

ubuntu_2404_defaults_auditd_action_mail_acct: 'root'
ubuntu_2404_defaults_auditd_disk_full_action: 'HALT'
ubuntu_2404_defaults_auditd_space_left: '25%'
ubuntu_2404_defaults_auditd_space_left_action: 'email'
ubuntu_2404_defaults_auditd_log_group: 'root'

ubuntu_2404_defaults_pamd_pam_unix_module_argument: 'yescrypt'

ubuntu_2404_defaults_rsyslog_conf_file: '/etc/rsyslog.d/50-default.conf'
ubuntu_2404_defaults_rsyslog_authpriv_log: '/var/log/secure'
ubuntu_2404_defaults_rsyslog_deamon_log: '/var/log/messages'
