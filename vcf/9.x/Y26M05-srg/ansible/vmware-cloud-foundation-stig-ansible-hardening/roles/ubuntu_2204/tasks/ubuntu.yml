- name: UBTU-24-901260
  tags: [UBTU-24-901260]
  when: ubuntu_2404_defaults_run_ubtu_24_901260 | bool
  block:
    - name: UBTU-24-901260 - Get System Commands Directories Folder List
      ansible.builtin.command: |
        find \
        /bin /sbin /usr/bin /usr/sbin /usr/local/bin /usr/local/sbin \
        -perm /022 \
        -type d \
        -exec stat -c "%n %a" '{}' \;
      register: systemcmddirectory
      changed_when: false

    - name: UBTU-24-901260 - Set System Command Directory permissions to 755
      ansible.builtin.file:
        path: "{{ item.split()[0] }}"
        mode: '0755'
        state: directory
      loop: "{{ systemcmddirectory.stdout_lines }}"
      when: systemcmddirectory.stdout_lines | length > 0

