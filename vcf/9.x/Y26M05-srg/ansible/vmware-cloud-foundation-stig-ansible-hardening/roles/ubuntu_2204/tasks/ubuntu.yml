###################################################################################################################################
- name: UBTU-24-300001
  tags: [UBTU-24-300001]
  when: ubuntu_2404_defaults_run_ubtu_24_300001 | bool
  block:
    - name: UBTU-24-300001 - Get list of files in apt.conf.d folder
      ansible.builtin.find:
        paths: '{{ ubuntu_2404_vars_apt_conf_folder }}'
        file_type: file
        recurse: true
      register: apt_files_unauthenticated

    - name: UBTU-24-300001 - Check if APT::Get::AllowUnauthenticated is present in any file
      ansible.builtin.shell: 'grep -l "APT::Get::AllowUnauthenticated" "{{ ubuntu_2404_vars_apt_conf_folder }}"/*'
      register: apt_files_with_unauthenticated
      failed_when: false
      changed_when: false

    - name: UBTU-24-300001 - Ensure APT::Get::AllowUnauthenticated is set to false in found files
      ansible.builtin.lineinfile:
        path: "{{ item }}"
        regexp: '^APT::Get::AllowUnauthenticated'
        line: 'APT::Get::AllowUnauthenticated "false";'
        state: present
      with_items:
        - "{{ apt_files_with_unauthenticated.stdout_lines }}"
      when:
        - apt_files_with_unauthenticated.stdout != ""

    - name: UBTU-24-300001 - Add APT::Get::AllowUnauthenticated to any file if not found
      ansible.builtin.lineinfile:
        path: "{{ apt_files_unauthenticated.files[0].path }}"
        regexp: '^APT::Get::AllowUnauthenticated'
        line: 'APT::Get::AllowUnauthenticated "false";'
        mode: '0644'
        create: true
        state: present
      when:
        - apt_files_with_unauthenticated.stdout == ""

###################################################################################################################################
- name: UBTU-24-700320
  tags: [UBTU-24-700320]
  when: ubuntu_2404_defaults_run_ubtu_24_700320 | bool
  block:
    - name: UBTU-24-700320 - Check if Unattended-Upgrade::Remove-Unused-Kernel-Packages is present
      ansible.builtin.command: 'grep -l "Unattended-Upgrade::Remove-Unused-Kernel-Packages" "{{ ubuntu_2404_defaults_unattended_upgrades_file_path }}"'
      register: unused_kernel_packages
      failed_when: false
      changed_when: false

    - name: UBTU-24-700320 - Ensure Unattended-Upgrade::Remove-Unused-Kernel-Packages is set to true if present
      ansible.builtin.lineinfile:
        path: "{{ item }}"
        regexp: 'Unattended-Upgrade::Remove-Unused-Kernel-Packages'
        line: 'Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";'
        state: present
      with_items:
        - "{{ unused_kernel_packages.stdout_lines }}"
      when:
        - unused_kernel_packages.stdout != ""

    - name: UBTU-24-700320 - Add line Unattended-Upgrade::Remove-Unused-Kernel-Packages and set to true if not present
      ansible.builtin.lineinfile:
        path: "{{ ubuntu_2404_defaults_unattended_upgrades_file_path }}"
        regexp: 'Unattended-Upgrade::Remove-Unused-Kernel-Packages'
        line: 'Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";'
        state: present
        create: true
        mode: "0644"
        owner: root
        group: root
      when:
        - unused_kernel_packages.stdout == ""

    - name: UBTU-24-700320 - Check if Unattended-Upgrade::Remove-Unused-Dependencies is present
      ansible.builtin.command: 'grep -l "Unattended-Upgrade::Remove-Unused-Dependencies" "{{ ubuntu_2404_defaults_unattended_upgrades_file_path }}"'
      register: unused_dependencies
      failed_when: false
      changed_when: false

    - name: UBTU-24-700320 - Ensure Unattended-Upgrade::Remove-Unused-Dependencies is set to true
      ansible.builtin.lineinfile:
        path: "{{ item }}"
        regexp: 'Unattended-Upgrade::Remove-Unused-Dependencies'
        line: 'Unattended-Upgrade::Remove-Unused-Dependencies "true";'
        state: present
      with_items:
        - "{{ unused_dependencies.stdout_lines }}"
      when:
        - unused_dependencies.stdout != ""

    - name: UBTU-24-700320 - Add line Unattended-Upgrade::Remove-Unused-Dependencies and set to true if not present
      ansible.builtin.lineinfile:
        path: "{{ ubuntu_2404_defaults_unattended_upgrades_file_path }}"
        regexp: 'Unattended-Upgrade::Remove-Unused-Dependencies'
        line: 'Unattended-Upgrade::Remove-Unused-Dependencies "true";'
        state: present
        create: true
        mode: "0644"
        owner: root
        group: root
      when:
        - unused_dependencies.stdout == ""

