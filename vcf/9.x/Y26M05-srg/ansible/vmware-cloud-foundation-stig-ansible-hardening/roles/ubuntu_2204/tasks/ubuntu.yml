      ansible.builtin.command: sysctl -n net.ipv4.tcp_syncookies
      register: tcp_syncookies
      failed_when: false
      changed_when: false

    - name: UBTU-24-600190 - Configure parameter net.ipv4.tcp_syncookies
      ansible.posix.sysctl:
        name: net.ipv4.tcp_syncookies
        value: 1
        state: present
        sysctl_file: '{{ ubuntu_2404_vars_sysctl_conf_file }}'
        sysctl_set: true
        reload: true
      when: (tcp_syncookies.stdout | default('0') | trim | int) < 1

    - name: UBTU-24-600190 - Remove duplicate net.ipv4.tcp_syncookies entries in sysctl file
      ansible.posix.sysctl:
        name: net.ipv4.tcp_syncookies
        value: 1
        state: absent
        sysctl_file: '{{ ubuntu_2404_defaults_sysctl_files }}'
        reload: true
      when: (tcp_syncookies.stdout | default('0') | trim | int) >= 1

