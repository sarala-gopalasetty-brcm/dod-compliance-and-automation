###################################################################################################################################
- name: UBTU-24-300021
  tags: [UBTU-24-300021]
  when: ubuntu_2404_defaults_run_ubtu_24_300021 | bool
  block:
    - name: UBTU-24-300021 - Review sudoers for NOPASSWD
      ansible.builtin.debug:
        msg: 'Review sudoers for NOPASSWD. Set ubuntu_2404_defaults_ubtu_24_300021_remediate_sudoers true to comment matching lines (validate with visudo). For !authenticate use UBTU-24-300019.'
      when: not (ubuntu_2404_defaults_ubtu_24_300021_remediate_sudoers | default(false) | bool)

    - name: UBTU-24-300021 - Find sudoers.d files for NOPASSWD remediation
      ansible.builtin.find:
        paths: '{{ ubuntu_2404_defaults_sudoers_d_folder }}'
        patterns: '*'
        hidden: false
      register: sudoers_d_files_300021
      when: ubuntu_2404_defaults_ubtu_24_300021_remediate_sudoers | default(false) | bool

    - name: UBTU-24-300021 - Comment out lines containing NOPASSWD in /etc/sudoers
      ansible.builtin.replace:
        path: '{{ ubuntu_2404_defaults_sudoers_file }}'
        regexp: '^([^#].*NOPASSWD.*)$'
        replace: '# \1'
        backup: true
      when: ubuntu_2404_defaults_ubtu_24_300021_remediate_sudoers | default(false) | bool

    - name: UBTU-24-300021 - Comment out lines containing NOPASSWD in sudoers.d files
      ansible.builtin.replace:
        path: "{{ item.path }}"
        regexp: '^([^#].*NOPASSWD.*)$'
        replace: '# \1'
        backup: true
      loop: "{{ sudoers_d_files_300021.files | default([]) }}"
      when:
        - ubuntu_2404_defaults_ubtu_24_300021_remediate_sudoers | default(false) | bool
        - sudoers_d_files_300021.files is defined
        - sudoers_d_files_300021.files | length > 0

