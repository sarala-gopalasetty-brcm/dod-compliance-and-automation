- name: UBTU-24-300016
  tags: [UBTU-24-300016]
  when:
    - ubuntu_2404_defaults_run_ubtu_24_300016 | bool
    - (ubuntu_2404_libpam_pwquality_installed.rc | default(1)) == 0
  block:
    - name: UBTU-24-300016 - Check present enforcing in pwquality.conf
      ansible.builtin.shell: |
        set -o pipefail
        grep -oP '^enforcing\s*=\s*\K.*' {{ ubuntu_2404_vars_pam_pwquality_conf_file }} 2>/dev/null | head -1 || true
      args:
        executable: /bin/bash
      register: pwq_enforcing_current
      failed_when: false
      changed_when: false

    - name: UBTU-24-300016 - Configure pwquality.conf enforcing
      ansible.builtin.lineinfile:
        path: '{{ ubuntu_2404_vars_pam_pwquality_conf_file }}'
        state: present
        regexp: '^\s*#?\s*enforcing\s*=\s*.*$'
        line: enforcing = {{ ubuntu_2404_vars_pam_pwquality_enforcing }}
      when: (pwq_enforcing_current.stdout | default('0') | trim | int) < (ubuntu_2404_vars_pam_pwquality_enforcing | int)

    - name: UBTU-24-300016 - Check to see if pam_pwquality.so rule exists
      ansible.builtin.command: 'grep -E "pam_pwquality.so.*retry=3" {{ ubuntu_2404_vars_pamd_common_password_file }}'
      register: syspasspwq
      failed_when: syspasspwq.rc > 1
      changed_when: false

    - name: UBTU-24-300016 - Remove incorrect pam_pwquality.so entries
      ansible.builtin.lineinfile:
        path: "{{ ubuntu_2404_vars_pamd_common_password_file }}"
        regexp: '^password\s*(requisite|required)\s*pam_pwquality.so.*$'
        state: absent
      when:
        - syspasspwq.stdout == ""

    - name: UBTU-24-300016 - When passwords are changed or new passwords are established, pwquality must be used
      community.general.pamd:
        name: common-password
        type: password
        control: '[success=1 default=ignore]'
        module_path: pam_unix.so
        new_type: password
        new_control: requisite
        new_module_path: pam_pwquality.so
        module_arguments:
          - retry=3
        state: before
      when:
        - syspasspwq.stdout == ""

