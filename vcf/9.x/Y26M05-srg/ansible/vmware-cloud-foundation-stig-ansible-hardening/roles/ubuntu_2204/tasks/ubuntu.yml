  when: ubuntu_2404_defaults_run_ubtu_24_100400 | bool
  block:
    - name: UBTU-24-100400 - Check to see if auditd is installed
      ansible.builtin.shell: |
        set -o pipefail
        dpkg -l | grep auditd
      args:
        executable: /bin/bash
      register: auditdinstalled
      failed_when: auditdinstalled.rc == 2
      changed_when: false

    - name: UBTU-24-100400 - Install auditd
      ansible.builtin.apt:
        name: auditd
        state: present
      register: output
      changed_when: output.changed
      when:
        - ubuntu_2404_defaults_run_ubtu_24_100400_install | bool
        - auditdinstalled.stdout == ""

