        - '{{ role_name }} : restart auditd'
      when:
        - auditdinstalled.stdout != ""

###################################################################################################################################
# Putting it at the end as these control requires reboot of System.
- name: UBTU-24-700020
  tags: [UBTU-24-700020, UBTU-24-700080, UBTU-24-700060, UBTU-24-700090, UBTU-24-700070]
  when: ubuntu_2404_defaults_run_ubtu_24_700020 | bool
  block:
    # UBTU-24-700020 (2750/0640), UBTU-24-700080/700060 (dirs), UBTU-24-700090/700070 (files)
    - name: UBTU-24-700020 - Set the appropriate permissions to the files and directories used by the systemd journal
      ansible.builtin.lineinfile:
        path: "{{ ubuntu_2404_defaults_systemd_journal }}"
        state: present
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        firstmatch: true
        backup: true
      with_items:
        - { regexp: '^#?\s*z /run/log/journal 275[50] root systemd-journal - -', line: 'z /run/log/journal 2750 root systemd-journal - -' }
        - { regexp: '^#?\s*Z /run/log/journal/%m ~275[50] root systemd-journal - -', line: 'Z /run/log/journal/%m ~2750 root systemd-journal - -' }
        - { regexp: '^#?\s*z /var/log/journal 275[50] root systemd-journal - -', line: 'z /var/log/journal 2750 root systemd-journal - -' }
        - { regexp: '^#?\s*z /var/log/journal/%m 275[50] root systemd-journal - -', line: 'z /var/log/journal/%m 2750 root systemd-journal - -' }
        - { regexp: '^#?\s*z /var/log/journal/%m/system.journal [0-7][0-6][0-4][0-7] root systemd-journal - -', line: 'z /var/log/journal/%m/system.journal 0640 root systemd-journal - -' }
      notify:
        - '{{ role_name }} : reboot system'
