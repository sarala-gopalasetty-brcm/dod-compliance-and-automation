###################################################################################################################################
- name: UBTU-24-200610
  tags: [UBTU-24-200610]
  when: ubuntu_2404_defaults_run_ubtu_24_200610 | bool
  block:
    - name: 'UBTU-24-200610 - Get current contents of {{ ubuntu_2404_vars_pamd_common_auth_file }}'
      ansible.builtin.slurp:
        src: '{{ ubuntu_2404_vars_pamd_common_auth_file }}'
      register: systemauthslurp

    - name: 'UBTU-24-200610 - Decode current contents of {{ ubuntu_2404_vars_pamd_common_auth_file }} and set fact'
      # Note: Jinja template in name is required for this control
      ansible.builtin.set_fact:
        systemauthcontent: "{{ systemauthslurp['content'] | b64decode }}"

    - name: 'UBTU-24-200610 - Check to see if pam_faillock.so authfail and authsucc rule exists in {{ ubuntu_2404_vars_pamd_common_auth_file }} and is after the pam_unix.so rule'
      # Note: Jinja template in name is required for this control
      ansible.builtin.set_fact:
        auth_rule_check: "{{ systemauthcontent | regex_search('^auth\\s+(required|requisite)\\s+pam_unix\\.so.*$\\nauth\\s+\\[default=die\\]\\s+pam_faillock\\.so\\sauthfail$\\nauth\\s+sufficient\\s+pam_faillock\\.so\\sauthsucc$', multiline=True) }}"

    - name: 'UBTU-24-200610 - Remove existing pam_faillock.so rules in {{ ubuntu_2404_vars_pamd_common_auth_file }} if one not found or incorrect'
      # Note: Jinja template in name is required for this control
      ansible.builtin.lineinfile:
        path: '{{ ubuntu_2404_vars_pamd_common_auth_file }}'
        state: absent
        regexp: '^auth\s+(required|requisite|\[default=die\])\s+pam_faillock\.so.*$'
      when:
        - auth_rule_check == ""

    - name: UBTU-24-200610 - Add pam_faillock.so authfail to common-auth if it doesn't exist
      community.general.pamd:
        name: common-auth
        type: auth
        control: '[success=1 default=ignore]'
        module_path: pam_unix.so
        new_type: auth
        new_control: '[default=die]'
        new_module_path: pam_faillock.so
        module_arguments:
          - authfail
        state: after

    - name: UBTU-24-200610 - Add pam_faillock.so authsucc to common-auth if it doesn't exist
      community.general.pamd:
        name: common-auth
        type: auth
        control: '[default=die]'
        module_path: pam_faillock.so
        new_type: auth
        new_control: sufficient
        new_module_path: pam_faillock.so
        module_arguments:
          - authsucc
        state: after

    - name: UBTU-24-200610 - Configure faillock.conf audit
      ansible.builtin.lineinfile:
        path: '{{ ubuntu_2404_vars_faillock_conf_file }}'
        state: present
        regexp: '^\s*#?\s*audit\s'
        line: audit
        firstmatch: true

    - name: UBTU-24-200610 - Configure faillock.conf silent
      ansible.builtin.lineinfile:
        path: '{{ ubuntu_2404_vars_faillock_conf_file }}'
        state: present
        regexp: '^\s*#?\s*silent\s'
        line: silent
        firstmatch: true

    - name: UBTU-24-200610 - Check present faillock deny value
      ansible.builtin.shell: |
        set -o pipefail
        grep -oP '^\s*deny\s*=\s*\K\d+' {{ ubuntu_2404_vars_faillock_conf_file }} 2>/dev/null | head -1 || true
      args:
        executable: /bin/bash
      register: faillock_deny_cur
      failed_when: false
      changed_when: false

    - name: UBTU-24-200610 - Configure faillock.conf deny
      ansible.builtin.lineinfile:
        path: '{{ ubuntu_2404_vars_faillock_conf_file }}'
        state: present
        regexp: '^\s*#?\s*deny\s'
        line: 'deny = {{ ubuntu_2404_vars_deny_faillock_conf }}'
        firstmatch: true
      when: (faillock_deny_cur.stdout | default('999') | trim | int) > (ubuntu_2404_vars_deny_faillock_conf | int)

    - name: UBTU-24-200610 - Check present faillock fail_interval value
      ansible.builtin.shell: |
        set -o pipefail
        grep -oP '^\s*fail_interval\s*=\s*\K\d+' {{ ubuntu_2404_vars_faillock_conf_file }} 2>/dev/null | head -1 || true
      args:
        executable: /bin/bash
      register: faillock_interval_cur
      failed_when: false
      changed_when: false

    - name: UBTU-24-200610 - Configure faillock.conf fail_interval
      ansible.builtin.lineinfile:
        path: '{{ ubuntu_2404_vars_faillock_conf_file }}'
        state: present
        regexp: '^\s*#?\s*fail_interval\s'
        line: 'fail_interval = {{ ubuntu_2404_vars_fail_interval_faillock_conf }}'
        firstmatch: true
      when: (faillock_interval_cur.stdout | default('') | trim | length == 0) or ((faillock_interval_cur.stdout | trim | int) > (ubuntu_2404_vars_fail_interval_faillock_conf | int))

    - name: UBTU-24-200610 - Check present faillock unlock_time value
      ansible.builtin.shell: |
        set -o pipefail
        grep -oP '^\s*unlock_time\s*=\s*\K\d+' {{ ubuntu_2404_vars_faillock_conf_file }} 2>/dev/null | head -1 || true
      args:
        executable: /bin/bash
      register: faillock_unlock_cur
      failed_when: false
      changed_when: false

    - name: UBTU-24-200610 - Configure faillock.conf unlock_time
      ansible.builtin.lineinfile:
        path: '{{ ubuntu_2404_vars_faillock_conf_file }}'
        state: present
        regexp: '^\s*#?\s*unlock_time\s'
        line: 'unlock_time = {{ ubuntu_2404_vars_unlock_time_faillock_conf }}'
        firstmatch: true
      when: (((ubuntu_2404_vars_unlock_time_faillock_conf | int) == 0) and ((faillock_unlock_cur.stdout | default('') | trim) != '0')) or (((ubuntu_2404_vars_unlock_time_faillock_conf | int) != 0) and (((faillock_unlock_cur.stdout | default('') | trim | length == 0) or ((faillock_unlock_cur.stdout | trim | int) > (ubuntu_2404_vars_unlock_time_faillock_conf | int)))))

###################################################################################################################################
- name: UBTU-24-300017
  tags: [UBTU-24-300017]
  when: ubuntu_2404_defaults_run_ubtu_24_300017 | bool
  block:
    - name: UBTU-24-300017 - Check to see if pam_faildelay.so rule exists
      ansible.builtin.command:
        argv:
          - grep
          - -E
          - '^auth\s+(required|requisite|optional)\s+pam_faildelay\.so\sdelay=4000000$'
          - '{{ ubuntu_2404_vars_pamd_common_auth_file }}'
      register: sysauthfaildelay
      failed_when: sysauthfaildelay.rc == 2
      changed_when: false

    - name: UBTU-24-300017 - Remove existing pam_faildelay.so rule in common-auth if it is incorrect
      community.general.pamd:
        name: common-auth
        type: auth
        control: optional
        module_path: pam_faildelay.so
        state: absent
      when:
        - sysauthfaildelay.stdout == ""

    # Need to use lininfile instead of pam because of the placement this needs to go can't be dealt with by the ansible pam module
    - name: UBTU-24-300017 - Add pam_faildelay.so to common-auth if it doesn't exist
      ansible.builtin.lineinfile:
        path: '{{ ubuntu_2404_vars_pamd_common_auth_file }}'
        state: present
        regexp: '^#?auth\s+(required|requisite|optional)\s+pam_faildelay\.so\sdelay=4000000$'
        line: auth  required      pam_faildelay.so delay=4000000

###################################################################################################################################
- name: UBTU-24-200000
  tags: [UBTU-24-200000]
  when: ubuntu_2404_defaults_run_ubtu_24_200000 | bool
  block:
    - name: UBTU-24-200000 - Check present maxlogins value
      ansible.builtin.shell: |
        set -o pipefail
        shopt -s nullglob
        f="{{ ubuntu_2404_vars_limits_conf_file }}"
        d="{{ ubuntu_2404_defaults_limits_d_folder }}"
        mins=""
        for src in "$f" "$d"/*.conf; do
          [ -f "$src" ] || continue
          while read -r n; do
            [ -n "$n" ] && mins="$mins $n"
          done < <(grep -E '^\*[[:space:]]+hard[[:space:]]+maxlogins' "$src" 2>/dev/null | grep -v '^#' | awk '{print $NF}' | grep -E '^[0-9]+$')
          while read -r n; do
            [ -n "$n" ] && mins="$mins $n"
          done < <(grep -E '^\*[[:space:]]+-[[:space:]]+maxlogins' "$src" 2>/dev/null | grep -v '^#' | awk '{print $NF}' | grep -E '^[0-9]+$')
          while read -r n; do
            [ -n "$n" ] && mins="$mins $n"
          done < <(grep -E '^\*.*maxlogins' "$src" 2>/dev/null | grep -v '^#' | awk '{print $NF}' | grep -E '^[0-9]+$')
        done
        if [ -n "$mins" ]; then
          echo "$mins" | tr ' ' '\n' | grep -E '^[0-9]+$' | sort -n | head -1
        else
          echo ""
        fi
      args:
        executable: /bin/bash
      register: limits_maxlogins_cur
      failed_when: false
      changed_when: false

    - name: UBTU-24-200000 - Configure maxlogins in limits.conf
      community.general.pam_limits:
        limit_item: maxlogins
        domain: "*"
        limit_type: hard
        value: "{{ ubuntu_2404_vars_limits_maxlogins }}"
      when: (limits_maxlogins_cur.stdout | default('99999') | trim | int) > (ubuntu_2404_vars_limits_maxlogins | int)

