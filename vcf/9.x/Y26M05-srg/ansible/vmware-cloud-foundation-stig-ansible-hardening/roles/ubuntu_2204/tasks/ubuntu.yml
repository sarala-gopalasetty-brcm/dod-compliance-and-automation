###################################################################################################################################
# Backup files that may be modified in case restoration is needed
- name: Backup files that may be modified in case restoration is needed
  tags: [always, backup]
  when: create_backups | bool
  block:
    - name: Backup files - Create time stamp
      ansible.builtin.set_fact:
        backup_timestamp: "{{ lookup('pipe', 'date +%Y-%m-%d-%H-%M-%S') }}"

    - name: Backup files - If restoring be sure to restore permissions that original file had!!
      ansible.builtin.copy:
        remote_src: true
        src: "{{ item }}"
        dest: "/tmp/ansible-backups-ubuntu-{{ backup_timestamp }}/"
        mode: preserve
      changed_when: false
      register: backupresult
      when: not ansible_check_mode
      failed_when:
        - backupresult.msg is defined
        - "'not found' not in backupresult.msg"
      with_items:
        - '{{ ubuntu_2404_vars_grub_default_file }}'
        - '{{ ubuntu_2404_defaults_boot_grub_cfg_file }}'
        - '{{ ubuntu_2404_vars_sysctl_conf_file }}'
        - '{{ ubuntu_2404_defaults_sysctl_files }}'
        - '{{ ubuntu_2404_vars_apt_conf_folder }}'
        - '{{ ubuntu_2404_defaults_unattended_upgrades_file_path }}'
        - '{{ ubuntu_2404_defaults_etc_issue_file }}'
        - '{{ ubuntu_2404_vars_sshd_config_file }}'
        - '{{ ubuntu_2404_defaults_sudoers_file }}'
        - '{{ ubuntu_2404_defaults_sudoers_d_folder }}'
        - '{{ ubuntu_2404_defaults_sssd_conf_path }}'
        - '{{ ubuntu_2404_vars_login_defs_file }}'
        - '{{ ubuntu_2404_vars_useradd_file }}'
        - '{{ ubuntu_2404_vars_limits_conf_file }}'
        - '{{ ubuntu_2404_defaults_limits_d_folder }}'
        - '{{ ubuntu_2404_vars_profile_tmout_sh }}'
        - '{{ ubuntu_2404_vars_pam_pwquality_conf_file }}'
        - '{{ ubuntu_2404_vars_auditd_conf_file }}'
        - '{{ ubuntu_2404_vars_auditd_rule_file }}'
        - '{{ ubuntu_2404_defaults_systemd_journal }}'
        - '{{ ubuntu_2404_vars_pamd_common_password_file }}'
        - '{{ ubuntu_2404_vars_pamd_login_file }}'
        - '{{ ubuntu_2404_vars_pamd_common_auth_file }}'
        - '{{ ubuntu_2404_vars_faillock_conf_file }}'
        - '{{ ubuntu_2404_defaults_rsyslog_conf_file }}'

