###################################################################################################################################
# UBTU-24-102010: session audit at boot — edit /etc/default/grub (Canonical STIG), then update-grub
- name: UBTU-24-102010
  tags: [UBTU-24-102010]
  when: ubuntu_2404_defaults_run_ubtu_24_102010 | bool
  block:
    - name: UBTU-24-102010 - Check to see if auditd is installed
      ansible.builtin.shell: |
        set -o pipefail
        dpkg -l | grep auditd
      args:
        executable: /bin/bash
      register: auditdinstalled
      failed_when: auditdinstalled.rc == 2
      changed_when: false

    - name: UBTU-24-102010 - Add audit=1 to GRUB_CMDLINE_LINUX in /etc/default/grub
      ansible.builtin.replace:
        path: '{{ ubuntu_2404_vars_grub_default_file }}'
        regexp: '^(GRUB_CMDLINE_LINUX=")((?:(?!audit=1).)*)(")$'
        replace: '\1audit=1 \2\3'
        backup: true
      when: auditdinstalled.rc == 0
      notify:
        - '{{ role_name }} : update grub'

    - name: UBTU-24-102010 - Add audit=1 to GRUB_CMDLINE_LINUX_DEFAULT in /etc/default/grub
      ansible.builtin.replace:
        path: '{{ ubuntu_2404_vars_grub_default_file }}'
        regexp: '^(GRUB_CMDLINE_LINUX_DEFAULT=")((?:(?!audit=1).)*)(")$'
        replace: '\1audit=1 \2\3'
        backup: true
      when: auditdinstalled.rc == 0
      notify:
        - '{{ role_name }} : update grub'

###################################################################################################################################
- name: UBTU-24-600140
  tags: [UBTU-24-600140]
  when: ubuntu_2404_defaults_run_ubtu_24_600140 | bool
  block:
    - name: UBTU-24-600140 - Check present kernel.dmesg_restrict value
      ansible.builtin.command: sysctl -n kernel.dmesg_restrict
      register: dmesg_restrict
      failed_when: false
      changed_when: false

    - name: UBTU-24-600140 - Configure kernel parameter kernel.dmesg_restrict
      ansible.posix.sysctl:
        name: kernel.dmesg_restrict
        value: 1
        state: present
        sysctl_file: '{{ ubuntu_2404_vars_sysctl_conf_file }}'
        sysctl_set: true
        reload: true
      when: (dmesg_restrict.stdout | default('0') | trim | int) < 1

    - name: UBTU-24-600140 - Remove duplicate kernel.dmesg_restrict entries in sysctl file
      ansible.posix.sysctl:
        name: kernel.dmesg_restrict
        value: 1
        state: absent
        sysctl_file: '{{ ubuntu_2404_defaults_sysctl_files }}'
        reload: true
      when: (dmesg_restrict.stdout | default('0') | trim | int) >= 1

